<!DOCTYPE html>
<html lang="en">
<head>
  <title>Employee Salary System</title>
  <link rel="stylesheet" href="5.css">
</head>
<body>
    

  <div class="main-box">
    <h1>Employee Salary Management System</h1>

    <div class="input-area">
      <input type="text" id="ename" placeholder="Employee Name">
      <input type="text" id="eid"   placeholder="Employee ID">
      <input type="number" id="esalary" placeholder="Salary">
      <input type="text" id="edept" placeholder="Department">
      <button onclick="add()">Add Employee</button>
    </div>

    <div class="buttons">
      <button onclick="showAll()">Display All</button>
      <button onclick="showHigh()">Salary ≥ 50000</button>
      <button onclick="showTotal()">Total Salary</button>
      <button onclick="showAvg()">Average Salary</button>
      <button onclick="showCount()">Count by Department</button>
    </div>

    <div id="result"></div>
    <br>
    <h1>KEERTI SHARMA</h1>
    <p>Roll No. : 2503201000624</p>
  </div>

  <script src="5.jsx"></script>
</body>
</html>
